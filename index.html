<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Page 1 – Fee Management</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background:#f5f6fa; margin:20px; }
h2,h3 { color:#2f3640; }
input, select, button { padding:8px 10px; margin:5px 0; border-radius:5px; border:1px solid #dcdde1; }
button { background:#40739e; color:#fff; cursor:pointer; }
button:hover { background:#2f3640; }
.card { background:#fff; padding:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); margin-top:20px; }
label { display:block; margin-top:8px; }
</style>
</head>
<body>

<h2>ছাত্র/ছাত্রী ফি ম্যানেজমেন্ট</h2>

<div class="card">
<label>Search Student by ID:</label>
<input type="text" id="searchId">
<button onclick="searchStudent()">Search</button>
</div>

<div class="card" id="feeFormDiv" style="display:none;">
<h3>Fee Entry Form</h3>
<label>Month:</label>
<select id="month"></select><br>
<div id="feeInputs"></div>
<button onclick="submitFee()">Submit Fee</button>
</div>

<div class="card" id="createFormDiv" style="display:none;">
<h3>Create Student Account</h3>
<div id="accountInputs"></div>
<button onclick="createAccount()">Create Account</button>
</div>

<script>
const webAppUrl = "https://script.google.com/macros/s/AKfycbyaEHjShABt2BGuf0zlz2Gnt3EUng4HA--qlRfYa73r5V5aVLuwRm81BVLiv6ouxdAL/exec"; // replace with your Apps Script URL

// Fee sections and months
const feeSections = ["tuition","admission","readmission","exam","computer","late","sports","tc","misc"];
const feeLabels = ["Tuition Fee","Admission Fee","Re-Admission Fee","Exam Fee","Computer Fee","Late Fee","Sports Fee","T.C Fee","Miscellaneous"];
const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const monthSelect = document.getElementById("month");
months.forEach(m=>monthSelect.innerHTML+=`<option>${m}</option>`);

// Fee inputs
const feeInputsDiv = document.getElementById("feeInputs");
feeLabels.forEach((f,i)=>feeInputsDiv.innerHTML+=`<label>${f}:</label><input type="number" id="${feeSections[i]}" value=0><br>`);

// Account creation inputs
const accountDiv = document.getElementById("accountInputs");
const accountFields = [
  {id:"studentName", label:"Name"}, {id:"father", label:"Father Name"}, {id:"mother", label:"Mother Name"},
  {id:"studentIdNew", label:"Student ID"}, {id:"roll", label:"Roll"}, {id:"cls", label:"Class"},
  {id:"section", label:"Section"}, {id:"mobile", label:"Mobile Number"}
];
accountFields.forEach(f=>accountDiv.innerHTML+=`<label>${f.label}:</label><input type="text" id="${f.id}"><br>`);

// Search Student
function searchStudent(){
  const id = document.getElementById("searchId").value.trim();
  if(!id){ alert("Enter Student ID"); return; }
  fetch(webAppUrl)
  .then(res=>res.json())
  .then(data=>{
    let found = false;
    for(let i=1;i<data.length;i++){ if(data[i][0]==id){found=true; break;} }
    if(found){
      document.getElementById("feeFormDiv").style.display="block";
      document.getElementById("createFormDiv").style.display="none";
    } else{
      document.getElementById("createFormDiv").style.display="block";
      document.getElementById("feeFormDiv").style.display="none";
    }
  }).catch(err=>alert("Error fetching student list: "+err));
}

// Submit Fee
function submitFee(){
  const fees={};
  feeSections.forEach(f=>fees[f]=Number(document.getElementById(f).value)||0);
  const data={action:"fee", studentId:document.getElementById("searchId").value, month:document.getElementById("month").value, fees:fees};
  fetch(webAppUrl,{method:"POST",body:JSON.stringify(data)})
  .then(res=>res.json())
  .then(resp=>{ if(resp.result=="success") alert("Fee submitted!"); else alert("Error!"); });
}

// Create Account
function createAccount(){
  const data={action:"create"};
  accountFields.forEach(f=>data[f.id]=document.getElementById(f.id).value);
  fetch(webAppUrl,{method:"POST",body:JSON.stringify(data)})
  .then(res=>res.json())
  .then(resp=>{ if(resp.result=="created") alert("Account created!"); else alert("Error!"); });
}
</script>
</body>
</html>
