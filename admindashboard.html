<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Visualization</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- Chart.js for graphs -->
</head>
<body>
<h2>অ্যাডমিন ড্যাশবোর্ড</h2>

<div>
  <h3>Class / Section Wise Student Fees</h3>
  <canvas id="classChart" width="600" height="300"></canvas>
</div>

<div>
  <h3>Students with Missing Fees</h3>
  <ul id="missingFeesList"></ul>
</div>

<div>
  <h3>Grand Total Fees</h3>
  <p id="grandTotal"></p>
</div>

<script>
const webAppUrl = "https://script.google.com/macros/s/AKfycbwEFmsn8aThCjDxHiOYMW7FcQ9MTNQY73QDBw7QnG2RGdGwm3pvELSjZBJdAZTffbBI/exec"; // Apps Script Web App URL

fetch(webAppUrl)
.then(res => res.json())
.then(data => {
  if(data.error){
    alert(data.error);
    return;
  }

  // Remove header row
  const headers = data[0];
  const students = data.slice(1);

  // Calculate totals
  const classTotals = {};
  let grandTotal = 0;
  const missingFeesStudents = [];

  students.forEach(s => {
    const studentId = s[0];
    const studentName = s[1];
    const cls = s[3];
    const section = s[4];
    const totalFees = Number(s[5] || 0);

    grandTotal += totalFees;

    const key = cls + " - " + section;
    if(!classTotals[key]) classTotals[key] = 0;
    classTotals[key] += totalFees;

    // Assuming 12 month expected fees = 12 * 1000 (example, customize)
    const expected12Months = 12*1000;
    if(totalFees < expected12Months){
      missingFeesStudents.push(studentName + " (" + studentId + ") - Missing Fees: " + (expected12Months-totalFees));
    }
  });

  // Display missing fees
  const ul = document.getElementById("missingFeesList");
  missingFeesStudents.forEach(m => {
    const li = document.createElement("li");
    li.textContent = m;
    ul.appendChild(li);
  });

  // Display grand total
  document.getElementById("grandTotal").textContent = "Grand Total All Students: " + grandTotal;

  // Chart
  const ctx = document.getElementById("classChart").getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: Object.keys(classTotals),
      datasets: [{
        label: 'Class / Section Total Fees',
        data: Object.values(classTotals),
        backgroundColor: 'rgba(54, 162, 235, 0.6)'
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        title: { display: true, text: 'Class / Section Fees Overview' }
      }
    }
  });

});
</script>
</body>
</html>
