<!DOCTYPE html>
<html>
<head>
    <title>Student Fee Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f5f5f5; }
        .stats-container { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 30px; }
        .card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1 1 200px; }
        .card h3 { margin: 0 0 10px; color: #333; }
        .card .number { font-size: 2em; font-weight: bold; color: #2c3e50; }
        .class-stats { background: white; border-radius: 8px; padding: 20px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .pending { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Fee Dashboard</h1>
    <div class="stats-container" id="globalStats"></div>
    <div class="class-stats" id="classStats"></div>
    <h2>All Students</h2>
    <table id="studentTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>ID</th>
                <th>Class</th>
                <th>Mobile</th>
                <th>Total Fee</th>
                <th>Missing Months</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const scriptUrl = 'https://script.google.com/macros/s/AKfycby-nTZBtr6mvNTnaflN-wYdjYz8-oIgYHEtRhTHGYyELyepjp-H__7Aj35jWYm9u3nh/exec'; // Replace with your deployed URL

        async function loadDashboard() {
            try {
                const response = await fetch(scriptUrl + '?action=getDashboardData');
                const data = await response.json();

                if (data.error) {
                    document.body.innerHTML = `<p style="color:red">Error: ${data.error}</p>`;
                    return;
                }

                // Global stats
                const globalHtml = `
                    <div class="card"><h3>Total Students</h3><div class="number">${data.totalStudents}</div></div>
                    <div class="card"><h3>Total Earnings</h3><div class="number">₹${data.totalEarnings}</div></div>
                    <div class="card"><h3>Students with Pending</h3><div class="number">${data.totalPendingCount}</div></div>
                `;
                document.getElementById('globalStats').innerHTML = globalHtml;

                // Class stats
                let classHtml = '<h3>Class-wise Statistics</h3><table><tr><th>Class</th><th>Students</th><th>Earnings</th><th>Pending Count</th></tr>';
                for (let cls in data.classStats) {
                    classHtml += `<tr><td>${cls}</td><td>${data.classStats[cls].totalStudents}</td><td>₹${data.classStats[cls].totalEarnings}</td><td>${data.classStats[cls].totalPending}</td></tr>`;
                }
                classHtml += '</table>';
                document.getElementById('classStats').innerHTML = classHtml;

                // Student table
                let rows = '';
                data.students.forEach(s => {
                    rows += `<tr>
                        <td>${s.name}</td>
                        <td>${s.id}</td>
                        <td>${s.class}</td>
                        <td>${s.mobile}</td>
                        <td>₹${s.totalFee}</td>
                        <td>${s.missingCount}</td>
                        <td class="${s.hasPending ? 'pending' : ''}">${s.hasPending ? 'Pending' : 'Paid'}</td>
                    </tr>`;
                });
                document.querySelector('#studentTable tbody').innerHTML = rows;
            } catch (err) {
                console.error(err);
                document.body.innerHTML = '<p style="color:red">Failed to load data.</p>';
            }
        }

        loadDashboard();
    </script>
</body>
</html>
